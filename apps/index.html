<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apps – Krishnal Panara</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300&family=Inter:wght@300;400;500;600;700;800;900&family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        font-family: "Inter", sans-serif;
        background-color: #000;
        color: #fff;
        line-height: 1.7;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 60px 30px 100px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #888;
        text-decoration: none;
        font-size: 14px;
        margin-bottom: 40px;
        transition: color 0.3s ease;
      }

      .back-link:hover {
        color: #fff;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 10px;
        color: #fff;
      }

      .subtitle {
        color: #888;
        font-size: 16px;
        margin-bottom: 50px;
      }

      .app-card {
        background: #111;
        border: 1px solid #333;
        border-radius: 16px;
        padding: 30px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 25px;
        transition: border-color 0.3s ease, transform 0.3s ease;
        text-decoration: none;
      }

      .app-card:hover {
        border-color: #555;
        transform: translateY(-2px);
      }

      .app-icon {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: linear-gradient(135deg, #ff6b9d 0%, #c44569 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        flex-shrink: 0;
      }

      .app-info h2 {
        font-size: 1.4rem;
        font-weight: 600;
        color: #fff;
        margin-bottom: 5px;
      }

      .app-info p {
        color: #aaa;
        font-size: 14px;
        margin-bottom: 12px;
      }

      .app-links {
        display: flex;
        gap: 15px;
      }

      .app-links a {
        color: #888;
        text-decoration: none;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: color 0.3s ease;
      }

      .app-links a:hover {
        color: #fff;
      }

      @media only screen and (max-width: 600px) {
        .app-card {
          flex-direction: column;
          text-align: center;
        }

        .app-links {
          justify-content: center;
        }

        h1 {
          font-size: 1.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="/" class="back-link">
        <i class="ri-arrow-left-line"></i>
        Back to Portfolio
      </a>

      <h1>Apps</h1>
      <p class="subtitle">Mobile applications developed by Krishnal</p>

      <a href="https://play.google.com/store/apps/details?id=com.krishnal.petboba" class="app-card" target="_blank" rel="noopener">
        <div class="app-icon">🐾</div>
        <div class="app-info">
          <h2>Pet Boba</h2>
          <p>Transform your pet photos into adorable AI-generated artwork with various creative styles.</p>
          <div class="app-links">
            <span><i class="ri-google-play-fill"></i> Google Play</span>
            <span onclick="event.preventDefault(); event.stopPropagation(); window.location.href='/apps/petboba/privacy-policy.html';"><i class="ri-shield-line"></i> Privacy Policy</span>
          </div>
        </div>
      </a>
    </div>
  </body>
</html>
